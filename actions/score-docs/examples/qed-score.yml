# .github/workflows/qed-score.yml
#
# Score markdown files on every PR against a QED resonance profile.
# Posts a comment with per-trait quality scores.
#
# More info: https://qed.systems

name: QED Score

on:
  pull_request:
    paths: ['**/*.md']

permissions:
  pull-requests: write

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: onebit0fme/qed-plugins/actions/score-docs@main
        # with:
        #   profile: qed.compelling-readme    # default
        #   threshold: 60                      # flag files below this score
